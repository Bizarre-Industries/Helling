name: Bug Report
description: Report a bug in Helling
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Helling version
      placeholder: v0.1.0
  - type: dropdown
    id: mode
    attributes:
      label: Deployment mode
      options:
        - Docker
        - Debian (bare metal)
        - Lima VM

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: ./.github/actions/setup-go-env
        with:
          go-version: "1.26"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.0
        with:
          bun-version: latest

      - name: Install lint and tools
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v1.65.0

      - name: Install web deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Format check
        run: make fmt-check

      - name: Generate (and check drift)
        run: make check-generated

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  vuln:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-env
        with:
          go-version: "1.26"
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          (cd apps/hellingd && govulncheck ./...)
          (cd apps/helling-cli && govulncheck ./...)

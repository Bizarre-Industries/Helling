name: Quality

# The merge gate. Mirrors `task check` exactly.
# Action pins resolved 2026-04-21 per ADR-026.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      go: ${{ steps.filter.outputs.go }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sql: ${{ steps.filter.outputs.sql }}
      docs: ${{ steps.filter.outputs.docs }}
      openapi: ${{ steps.filter.outputs.openapi }}
      yaml: ${{ steps.filter.outputs.yaml }}
      shell: ${{ steps.filter.outputs.shell }}
      parity: ${{ steps.filter.outputs.parity }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'scripts/check-coverage.sh'
            frontend:
              - 'web/**'
            sql:
              - 'db/**'
              - 'sqlc.yaml'
              - 'internal/db/**'
              - 'internal/store/**'
            docs:
              - '**/*.md'
              - 'docs/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'SECURITY.md'
              - 'CODE_OF_CONDUCT.md'
            openapi:
              - 'api/**'
              - 'tools/openapi-dump/**'
              - 'apps/hellingd/**'
            yaml:
              - '**/*.yaml'
              - '**/*.yml'
            shell:
              - '**/*.sh'
              - '**/*.bash'
            parity:
              - 'api/**'
              - 'apps/helling-cli/**'
              - 'web/**'
              - 'scripts/check-parity.sh'
            workflow:
              - '.github/workflows/quality.yml'
              - '.github/actions/**'

  openapi:
    name: OpenAPI lint (score ≥100)
    needs: changes
    if: needs.changes.outputs.openapi == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cache vacuum binary
        id: vacuum-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/vacuum
          key: ${{ runner.os }}-vacuum-0.26.4
      - name: Install vacuum
        if: steps.vacuum-cache.outputs.cache-hit != 'true'
        env:
          VACUUM_VERSION: "0.26.4"
          VACUUM_SHA256: "e1c13c3ef2814a07f83bb22e465a94f202114db38267502e4fdf2b9f4dbeda92"
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/vacuum.tar.gz \
            "https://github.com/daveshanley/vacuum/releases/download/v${VACUUM_VERSION}/vacuum_${VACUUM_VERSION}_linux_x86_64.tar.gz"
          echo "${VACUUM_SHA256}  /tmp/vacuum.tar.gz" | sha256sum -c -
          tar -xzf /tmp/vacuum.tar.gz -C "$HOME/.local/bin" vacuum
      - name: Vacuum version
        run: vacuum version
      - name: Lint
        run: vacuum lint --ruleset api/.vacuum.yaml --fail-severity info api/openapi.yaml
      - name: Gate score at 100 (against our ruleset)
        run: |
          score=$(vacuum report --stdout -r api/.vacuum.yaml api/openapi.yaml | jq -r '.statistics.overallScore // .overallScore // 0')
          echo "openapi score: ${score}/100"
          if [ "${score}" -lt 100 ]; then
            echo "::error::openapi score ${score}/100 below minimum 100/100"
            exit 1
          fi

  openapi-generated:
    name: OpenAPI drift check
    needs: changes
    if: needs.changes.outputs.openapi == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-go-env
      - name: Verify generated Go server code matches OpenAPI contract
        run: |
          if [ -f apps/hellingd/api/generate.go ]; then
            cd apps/hellingd
            go generate ./api/...
            cd ../..
            if ! git diff --exit-code -- apps/hellingd/api/server.gen.go || [ -n "$(git ls-files --others --exclude-standard -- apps/hellingd/api/server.gen.go)" ]; then
              echo "::error::generated Go server code drifted. Run: cd apps/hellingd && go generate ./api/..."
              git ls-files --others --exclude-standard -- apps/hellingd/api/server.gen.go
              exit 1
            fi
          else
            echo "apps/hellingd API generator not present; skipping drift check"
          fi

  markdown:
    name: Markdown lint + prettier
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache npm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-prettier-3.3.3
          restore-keys: |
            ${{ runner.os }}-npm-prettier-
      # Bumped 2026-04-21: v16.0.0 → v22.0.0 (6 major versions behind).
      # Major jumps: markdownlint-cli2 v0.13 → v0.20, markdownlint v0.34 → v0.40.
      # No config changes required — same `globs` input schema.
      - uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: |
            **/*.md
            !node_modules
            !web/node_modules
            !refs
      - name: Prettier check
        run: |
          npx -y prettier@3.3.3 --write --check '**/*.md' --ignore-path .gitignore

  yaml:
    name: YAML lint (strict)
    needs: changes
    if: needs.changes.outputs.yaml == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-yamllint-1.35.1
          restore-keys: |
            ${{ runner.os }}-pip-yamllint-
      - name: Install yamllint
        run: pip install yamllint==1.35.1
      - name: Lint
        run: |
          # Exclude refs/ and node_modules/ from walk.
          find . -maxdepth 4 -type f \( -name '*.yaml' -o -name '*.yml' \) \
            -not -path './.git/*' \
            -not -path './refs/*' \
            -not -path './node_modules/*' \
            -not -path './web/node_modules/*' \
            -not -path './.task/*' \
            -not -path './dist/*' \
            -print0 | xargs -0 yamllint -s

  shell:
    name: Shell lint + format
    needs: changes
    if: needs.changes.outputs.shell == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-go-env
        with:
          cache-go: "false"
      - name: Install shellcheck + shfmt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          if ! command -v shfmt >/dev/null 2>&1; then
            go install mvdan.cc/sh/v3/cmd/shfmt@v3.9.0
          fi
      - name: Lint + format check
        run: |
          files=$(find . -type f \( -name '*.sh' -o -name '*.bash' \) \
            -not -path './.git/*' \
            -not -path './refs/*')
          if [ -n "$files" ]; then
            echo "$files" | xargs shellcheck -S style -e SC1091
            echo "$files" | xargs shfmt -d -i 2 -ci -bn
          fi

  go:
    name: Go build / vet / lint / vuln / test / coverage
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-go-env
      - name: Build
        run: |
          for mod in apps/hellingd apps/helling-cli; do
            if [ -f "$mod/go.mod" ]; then
              echo "▶ go build $mod"
              (cd "$mod" && go build ./...)
            fi
          done
      - name: Vet
        run: |
          for mod in apps/hellingd apps/helling-cli; do
            if [ -f "$mod/go.mod" ]; then
              echo "▶ go vet $mod"
              (cd "$mod" && go vet ./...)
            fi
          done
      - name: Mod tidy check
        run: |
          for mod in apps/hellingd apps/helling-cli; do
            if [ -f "$mod/go.mod" ]; then
                echo "▶ go mod tidy check $mod"
                (
                  cd "$mod"
                  tmpdir=$(mktemp -d)
                  trap 'rm -rf "$tmpdir"' EXIT
                  cp go.mod "$tmpdir/go.mod"
                  cp go.sum "$tmpdir/go.sum" 2>/dev/null || true
                  go mod tidy
                  if ! diff -q go.mod "$tmpdir/go.mod" >/dev/null 2>&1 || ( [ -f go.sum ] && ! diff -q go.sum "$tmpdir/go.sum" >/dev/null 2>&1 ); then
                    cp "$tmpdir/go.mod" go.mod
                    cp "$tmpdir/go.sum" go.sum 2>/dev/null || rm -f go.sum
                    echo "::error::$mod go.mod or go.sum is not tidy. Run: cd $mod && go mod tidy"
                    exit 1
                  fi
                )
              fi
            done
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: golangci-lint
        run: |
          for mod in apps/hellingd apps/helling-cli; do
            if [ -f "$mod/go.mod" ]; then
              echo "▶ golangci-lint $mod"
              (cd "$mod" && golangci-lint run --timeout 5m ./...)
            fi
          done
      - name: Test with race + coverage
        run: |
          rm -rf .task/coverage
          mkdir -p .task/coverage
          for mod in apps/hellingd apps/helling-cli; do
            if [ -f "$mod/go.mod" ]; then
              name=$(basename "$mod")
              echo "▶ go test $mod"
              if [ "$name" = "hellingd" ]; then
                (cd "$mod" && go test -tags devauth -race -coverprofile="../../.task/coverage/$name.out" ./...)
              else
                (cd "$mod" && go test -race -coverprofile="../../.task/coverage/$name.out" ./...)
              fi
            fi
          done
      - name: Coverage gate
        run: |
          for profile in .task/coverage/*.out; do
            [ -f "$profile" ] || continue
            case "$profile" in
              *hellingd.out) HELLING_COVERAGE_OVERALL_FLOOR=20 bash scripts/check-coverage.sh "$profile" ;;
              *helling-cli.out) HELLING_COVERAGE_OVERALL_FLOOR=80 bash scripts/check-coverage.sh "$profile" ;;
              *) bash scripts/check-coverage.sh "$profile" ;;
            esac
          done
      - name: govulncheck
        run: |
          if ! command -v govulncheck >/dev/null 2>&1; then
            go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          fi
          for mod in apps/hellingd apps/helling-cli; do
            if [ -f "$mod/go.mod" ]; then
              echo "▶ govulncheck $mod"
              (cd "$mod" && govulncheck ./...)
            fi
          done

  frontend:
    name: Frontend tsc / codegen drift / tests / build
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Skip if no web/package.json
        id: skip
        working-directory: .
        run: |
          if [ ! -f web/package.json ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: steps.skip.outputs.skip != 'true'
      - name: Install
        if: steps.skip.outputs.skip != 'true'
        run: bun install --frozen-lockfile
      - name: tsc
        if: steps.skip.outputs.skip != 'true'
        run: bunx tsc --noEmit
      - name: Codegen drift
        if: steps.skip.outputs.skip != 'true'
        run: |
          bun run gen:api
          if ! git diff --exit-code -- src/api/generated || [ -n "$(git ls-files --others --exclude-standard -- src/api/generated)" ]; then
            echo "::error::frontend generated code drifted. Run: (cd web && bun run gen:api)"
            git ls-files --others --exclude-standard -- src/api/generated
            exit 1
          fi
      - name: Tests
        if: steps.skip.outputs.skip != 'true'
        run: bun run test
      - name: Build
        if: steps.skip.outputs.skip != 'true'
        run: bun run build

  sql:
    name: SQL lint / sqlc drift / goose round-trip
    needs: changes
    if: needs.changes.outputs.sql == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-go-env
        with:
          cache-go: "false"
      - name: Skip if no db/
        id: skip
        run: |
          if [ ! -d db ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Cache pip and pipx
        if: steps.skip.outputs.skip != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/pip
            ~/.local/pipx
          key: ${{ runner.os }}-pip-sqlfluff-3.0.7-yamllint-1.35.1-pyyaml-6.0.2
          restore-keys: |
            ${{ runner.os }}-pip-sqlfluff-
      - name: sqlfluff
        if: steps.skip.outputs.skip != 'true'
        run: |
          pipx install sqlfluff==3.0.7
          sqlfluff lint db/
      - name: Add local bin to PATH
        if: steps.skip.outputs.skip != 'true'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cache sqlc binary
        if: steps.skip.outputs.skip != 'true'
        id: sqlc-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/sqlc
          key: ${{ runner.os }}-sqlc-1.31.0
      # Fixed 2026-04-21: was fetching api.github.com/.../releases/latest and
      # parsing with jq — that's a floating pin per ADR-026. Explicit version +
      # SHA256 checksum, same pattern as vacuum above.
      - name: Install sqlc
        if: steps.skip.outputs.skip != 'true' && steps.sqlc-cache.outputs.cache-hit != 'true'
        env:
          SQLC_VERSION: "1.31.0"
          SQLC_SHA256: "e35394ba3df5e62669e76627f45172d18c6cbb1479e4762c51b29b0eafc16dc0"
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/sqlc.tar.gz \
            "https://github.com/sqlc-dev/sqlc/releases/download/v${SQLC_VERSION}/sqlc_${SQLC_VERSION}_linux_amd64.tar.gz"
          echo "${SQLC_SHA256}  /tmp/sqlc.tar.gz" | sha256sum -c -
          tar -xzf /tmp/sqlc.tar.gz -C "$HOME/.local/bin" sqlc
          sqlc version
      - name: sqlc drift
        if: steps.skip.outputs.skip != 'true'
        run: |
          if [ -f sqlc.yaml ]; then
            sqlc generate
            git diff --exit-code -- internal/db/queries || {
              echo "::error::sqlc-generated code drifted"
              exit 1
            }
          fi
      - name: goose round-trip
        if: steps.skip.outputs.skip != 'true'
        run: |
          if ! command -v goose >/dev/null 2>&1; then
            go install github.com/pressly/goose/v3/cmd/goose@v3.21.1
          fi
          if [ -d db/migrations ]; then
            tmp=$(mktemp -d)
            export GOOSE_DRIVER=sqlite3 GOOSE_DBSTRING="$tmp/test.db"
            goose -dir db/migrations up
            goose -dir db/migrations down-to 0
            goose -dir db/migrations up
          fi

  secrets:
    name: Secret scan (gitleaks)
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # Comment fixed 2026-04-21: SHA unchanged, but `# v2` implied a floating
      # major tag per ADR-026. SHA ff98106e… corresponds to v2.3.9 exactly.
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  spelling:
    name: Spelling (typos)
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Fixed 2026-04-21: was pinned to `master @ 2026-04-20` — floating tag
      # per ADR-026. v1.43.4 is a stable tag; dependabot will bump forward.
      - uses: crate-ci/typos@bbaefadf97b0ec5fdc942684b647f1a6ab250274 # v1.46.0

  links:
    name: Link check (lychee, offline)
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --offline --no-progress docs/ README.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md

  parity:
    name: API ↔ CLI ↔ WebUI parity
    needs: changes
    if: needs.changes.outputs.parity == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run parity check
        run: |
          pip install pyyaml==6.0.2
          bash scripts/check-parity.sh

  ci-complete:
    name: CI complete
    if: always()
    needs:
      - changes
      - openapi
      - openapi-generated
      - markdown
      - yaml
      - shell
      - go
      - frontend
      - sql
      - secrets
      - spelling
      - links
      - parity
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Ensure all needed jobs succeeded or skipped
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'

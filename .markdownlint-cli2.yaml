# markdownlint-cli2 glob + ignore config.
# Rule definitions live in .markdownlint.yaml.

globs:
  - "**/*.md"

ignores:
  - "node_modules/**"
  - "web/node_modules/**"
  - ".claude-plans/**"
  - ".task/**"
  - "dist/**"
  - "bin/**"
  - "web/src/api/generated/**"
  # refs/ contains vendored reference copies of other projects.
  # Not authored by Helling; not our lint responsibility.
  - "refs/**"
  # CHANGELOG.md is generated by git-cliff (see cliff.toml).
  # Format is owned by the cliff body template, not authored by hand.
  - "CHANGELOG.md"
  # lessons.md is gitignored (local-only project log per .gitignore L20).
  - "lessons.md"
  - "LESSONS.md"
  # .claude/ holds per-contributor agent/hook templates (gitignored).
  - ".claude/**"
  # CLAUDE.md is project-local AI assistant instructions (gitignored).
  - "CLAUDE.md"

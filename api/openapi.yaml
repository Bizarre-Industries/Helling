openapi: 3.0.3
info:
  title: Helling API
  version: 0.1.0
  description: |
    Helling is a self-hosted, single-node container and VM management platform.
    This is the v0.1 vertical slice: authentication, instance CRUD, and operation polling.

    All endpoints under `/v1/` are stable within v0.1. Breaking changes ship under `/v2/`.
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: Bizarre Industries
    url: https://github.com/Bizarre-Industries/helling

servers:
  - url: https://localhost/v1
    description: Local installation behind helling-proxy
  - url: http+unix:///run/helling/api.sock/v1
    description: Direct socket access (CLI, dev)

tags:
  - name: auth
    description: Authentication and session management
  - name: instances
    description: Container and VM lifecycle
  - name: operations
    description: Async operation tracking
  - name: meta
    description: Server identity, health, version

security:
  - cookieAuth: []

paths:
  /healthz:
    get:
      operationId: getHealth
      tags:
        - meta
      security: []
      summary: Liveness probe
      description: Returns the daemon liveness state and Incus reachability flag.
      responses:
        '200':
          description: Daemon is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /version:
    get:
      operationId: getVersion
      tags:
        - meta
      security: []
      summary: Server version and build info
      description: Returns the daemon semver, API version, git commit, and build timestamp.
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'

  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      security: []
      summary: Exchange username + password for a session cookie
      description: |
        Validates credentials and, on success, issues a session via the
        `helling_session` cookie. Subject to login rate limiting.
      requestBody:
        required: true
        description: User credentials
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '204':
          description: Login successful. Sets `helling_session` cookie.
          headers:
            Set-Cookie:
              description: Session cookie set on successful login.
              schema:
                type: string
                description: Standard Set-Cookie header value.
                example: helling_session=...; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=604800
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Invalidate the current session
      description: Revokes the session bound to the `helling_session` cookie and clears it client-side.
      responses:
        '204':
          description: Session invalidated. Clears `helling_session` cookie.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - auth
      summary: Identity of the authenticated user
      description: Returns the profile of the user bound to the current session cookie.
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /instances:
    get:
      operationId: listInstances
      tags:
        - instances
      summary: List instances visible to the user
      description: Returns the instances visible to the authenticated user, optionally filtered by status.
      parameters:
        - in: query
          name: status
          description: Optional status filter
          schema:
            type: string
            description: Lifecycle state to filter by.
            enum: [running, stopped, frozen, error]
            example: running
      responses:
        '200':
          description: List of instances
          content:
            application/json:
              schema:
                type: array
                description: Array of instance records.
                items:
                  $ref: '#/components/schemas/Instance'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createInstance
      tags:
        - instances
      summary: Create a new instance (async)
      description: Submits an instance create request. Returns the tracking operation; poll `/operations/{id}` for completion.
      requestBody:
        required: true
        description: Instance create parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceCreate'
      responses:
        '202':
          description: Operation accepted; poll `/operations/{id}` for completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /instances/{name}:
    parameters:
      - $ref: '#/components/parameters/InstanceName'
    get:
      operationId: getInstance
      tags:
        - instances
      summary: Fetch a single instance
      description: Returns the current snapshot of one instance.
      responses:
        '200':
          description: Instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteInstance
      tags:
        - instances
      summary: Delete an instance (async)
      description: Submits an instance delete request. Returns the tracking operation; poll `/operations/{id}` for completion.
      responses:
        '202':
          description: Deletion operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /instances/{name}/start:
    parameters:
      - $ref: '#/components/parameters/InstanceName'
    post:
      operationId: startInstance
      tags:
        - instances
      summary: Start an instance (async)
      description: Submits a start request for the named instance. Returns the tracking operation.
      responses:
        '202':
          description: Start operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /instances/{name}/stop:
    parameters:
      - $ref: '#/components/parameters/InstanceName'
    post:
      operationId: stopInstance
      tags:
        - instances
      summary: Stop an instance (async)
      description: Submits a stop request for the named instance. Optional body controls force + timeout. Returns the tracking operation.
      requestBody:
        required: false
        description: Optional stop options (force flag, timeout seconds)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceStopRequest'
      responses:
        '202':
          description: Stop operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /operations:
    get:
      operationId: listOperations
      tags:
        - operations
      summary: List operations for the current user
      description: Returns the recent operations submitted by the authenticated user, optionally filtered by status.
      parameters:
        - in: query
          name: status
          description: Optional status filter for operations.
          schema:
            type: string
            description: Operation status to filter by.
            enum: [pending, running, success, failure, cancelled]
            example: running
        - in: query
          name: limit
          description: Maximum number of results to return.
          schema:
            type: integer
            description: Maximum result count.
            minimum: 1
            maximum: 200
            default: 50
            example: 50
      responses:
        '200':
          description: Recent operations
          content:
            application/json:
              schema:
                type: array
                description: Array of operation records.
                items:
                  $ref: '#/components/schemas/Operation'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /operations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        description: Operation identifier (UUID).
        schema:
          type: string
          description: UUID v7 string.
          format: uuid
          example: 018f3a40-0000-7000-8000-000000000000
    get:
      operationId: getOperation
      tags:
        - operations
      summary: Fetch a single operation by ID
      description: Returns the current state of a single operation by its UUID.
      responses:
        '200':
          description: Operation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: helling_session
      description: Session cookie issued by `POST /auth/login`. Sent automatically by the browser; CLI stores it under `~/.config/helling/session`.

  parameters:
    InstanceName:
      in: path
      name: name
      required: true
      description: Instance name path parameter.
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]{0,62}$'
        example: web-1
        description: |
          Instance name. Lowercase letters, digits, and hyphens only.
          Max 63 chars. Must start with letter or digit.

  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: State conflict (e.g. instance already exists, already running)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Health:
      type: object
      description: Daemon liveness payload.
      required: [status]
      properties:
        status:
          type: string
          description: Aggregate daemon health state.
          enum: [ok, degraded]
          example: ok
        incus_reachable:
          type: boolean
          description: True when the Incus socket responded to the last probe.
          example: true

    Version:
      type: object
      description: Server build metadata.
      required: [version, api_version]
      properties:
        version:
          type: string
          description: Daemon semantic version string.
          example: 0.1.0
        api_version:
          type: string
          description: REST API major-version path segment.
          example: v1
        commit:
          type: string
          description: Git commit short SHA the binary was built from.
          example: 30ab4f5
        build_time:
          type: string
          description: Build timestamp (RFC 3339 / ISO 8601).
          format: date-time
          example: '2026-05-03T12:00:00Z'

    LoginRequest:
      type: object
      description: Username + password credentials submitted to `/auth/login`.
      required: [username, password]
      properties:
        username:
          type: string
          description: Account username.
          minLength: 1
          maxLength: 64
          example: alice
        password:
          type: string
          description: Account password (cleartext over TLS only).
          minLength: 8
          maxLength: 256
          format: password
          example: correct horse battery staple

    User:
      type: object
      description: Authenticated user identity.
      required: [id, username, is_admin, created_at]
      properties:
        id:
          type: integer
          description: Stable user identifier.
          format: int64
          example: 1
        username:
          type: string
          description: Account username.
          example: alice
        is_admin:
          type: boolean
          description: True for the bootstrap admin user.
          example: false
        created_at:
          type: string
          description: Account creation time (RFC 3339).
          format: date-time
          example: '2026-05-03T12:00:00Z'

    Instance:
      type: object
      description: Container or virtual-machine instance snapshot.
      required: [name, type, status]
      properties:
        name:
          type: string
          description: Instance name (Incus identifier).
          example: web-1
        type:
          type: string
          description: Instance kind reported by Incus.
          enum: [container, virtual-machine]
          example: container
        status:
          type: string
          description: Current lifecycle state.
          enum: [running, stopped, frozen, error, starting, stopping]
          example: running
        image:
          type: string
          description: Source image alias or fingerprint.
          example: images:debian/13
        architecture:
          type: string
          description: CPU architecture.
          example: x86_64
        created_at:
          type: string
          description: Instance creation timestamp (RFC 3339).
          format: date-time
          example: '2026-05-03T12:00:00Z'
        ipv4:
          type: array
          description: IPv4 addresses assigned to the instance.
          example: ['10.0.0.5']
          items:
            type: string
            description: IPv4 address in dotted-quad form.
            example: 10.0.0.5
        ipv6:
          type: array
          description: IPv6 addresses assigned to the instance.
          example: ['fd42::5']
          items:
            type: string
            description: IPv6 address.
            example: fd42::5

    InstanceCreate:
      type: object
      description: Request body for `POST /instances`.
      required: [name, image]
      properties:
        name:
          type: string
          description: Desired instance name.
          pattern: '^[a-z0-9][a-z0-9-]{0,62}$'
          example: web-1
        type:
          type: string
          description: Instance kind to create.
          enum: [container, virtual-machine]
          default: container
          example: container
        image:
          type: string
          description: |
            Image alias or fingerprint. Examples: `images:debian/13`,
            `images:ubuntu/24.04`, or a sha256 fingerprint.
          example: images:debian/13
        start:
          type: boolean
          description: If true, start immediately after creation.
          default: false
          example: false

    InstanceStopRequest:
      type: object
      description: Optional body for `POST /instances/{name}/stop`.
      properties:
        force:
          type: boolean
          description: If true, send SIGKILL after timeout instead of SIGTERM grace.
          default: false
          example: false
        timeout_seconds:
          type: integer
          description: Seconds to wait for graceful shutdown before forcing.
          minimum: 0
          maximum: 600
          default: 30
          example: 30

    Operation:
      type: object
      description: Async operation tracking record.
      required: [id, kind, status, created_at, updated_at]
      properties:
        id:
          type: string
          description: Operation identifier (UUID v7).
          format: uuid
          example: 018f3a40-0000-7000-8000-000000000000
        kind:
          type: string
          description: Operation kind, e.g. `instance.create` or `instance.delete`.
          example: instance.create
        target:
          type: string
          description: Resource the operation acts on (e.g. instance name).
          example: web-1
        status:
          type: string
          description: Current operation lifecycle state.
          enum: [pending, running, success, failure, cancelled]
          example: running
        error:
          type: string
          description: Present when status is `failure`.
          example: image fetch failed
        created_at:
          type: string
          description: Operation submission time (RFC 3339).
          format: date-time
          example: '2026-05-03T12:00:00Z'
        updated_at:
          type: string
          description: Last state-change time (RFC 3339).
          format: date-time
          example: '2026-05-03T12:00:05Z'
        progress_percent:
          type: integer
          description: Approximate progress between 0 and 100 (best-effort).
          minimum: 0
          maximum: 100
          example: 42

    Error:
      type: object
      description: Standard error envelope returned by 4xx and 5xx responses.
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable, machine-readable error code.
          example: not_found
        message:
          type: string
          description: Human-readable message.
          example: instance not found
        details:
          type: object
          description: Optional structured context.
          additionalProperties: true
          example:
            field: name

# cliff.toml — git-cliff config for Helling.
#
# Mirrors the conventional-commit prefixes enforced by lefthook commit-msg
# (see lefthook.yml `commit-msg.conventional`).
#
# Generate:  task changelog                # writes CHANGELOG.md
# Preview:   git-cliff --unreleased        # show pending entries

[changelog]
header = """
# Changelog

All notable changes to Helling are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and
this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | upper_first }}

{% for commit in commits %}\
- {{ commit.message | upper_first | trim }} ([`{{ commit.id | truncate(length=7, end="") }}`])
{% endfor %}\
{% endfor %}\
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Tests" },
  { message = "^build",    group = "Build" },
  { message = "^ci",       group = "CI" },
  { message = "^chore",    group = "Chore" },
  { message = "^style",    group = "Style" },
  { message = "^revert",   group = "Reverts" },
  { message = "^spec",     group = "Spec" },
  { message = "^adr",      group = "Architecture decisions" },
  { message = "^deps",     group = "Dependencies" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
date_order = false
sort_commits = "oldest"

d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i netcfg/choose_interface select auto
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i passwd/root-login boolean false
d-i user-setup/allow-password-weak boolean false
d-i pkgsel/include string ca-certificates curl gnupg dbus incus podman caddy sudo openssh-server
d-i pkgsel/upgrade select safe-upgrade
d-i preseed/late_command string \
  mkdir -p /target/var/log/installer; \
  cp -a /cdrom/helling/target-root/. /target/; \
  in-target chmod 0755 /usr/lib/helling/helling-first-boot; \
  in-target chmod 0644 /etc/systemd/system/hellingd.service; \
  in-target chmod 0644 /etc/systemd/system/helling-first-boot.service; \
  in-target systemctl enable helling-first-boot.service

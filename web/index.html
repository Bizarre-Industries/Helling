<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1440" />
    <title>Helling — Datacenter Console</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo-full-transparent.svg" />
    <script>
      // Swallow benign ResizeObserver loop warnings from third-party UI code.
      // Mirrors the suppression from the design prototype.
      window.addEventListener(
        'error',
        (e) => {
          if (e.message && /ResizeObserver/.test(e.message)) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return false;
          }
        },
        true,
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
